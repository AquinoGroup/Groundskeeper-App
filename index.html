<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grounds Crew — Weekly Work Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<!-- ============================================================ -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<!-- ============================================================ -->

<!-- Content Security Policy: explicitly allows the domains Firebase needs -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://www.google.com;
  connect-src 'self' https://firestore.googleapis.com https://www.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com;
  frame-src https://*.firebaseapp.com https://accounts.google.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src https://fonts.gstatic.com;
  img-src 'self' data:;
">

<style>
  :root{
    --pine:#1F3A2E;
    --pine-dark:#152A20;
    --canvas:#EDE7D3;
    --card:#FBF8F0;
    --soil:#6B4A38;
    --orange:#E2601A;
    --sage:#7C9473;
    --ink:#2B2620;
    --ink-soft:#5B5346;
    --line:#CFC5A6;
    --line-soft:#DED6BA;
    --font-display:'Oswald', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:var(--canvas);
    color:var(--ink);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(43,38,32,0.04) 1px, transparent 0);
    background-size:18px 18px;
    min-height:100vh;
  }
  .wrap{max-width:920px;margin:0 auto;padding:28px 20px 60px;}

  /* LOGIN */
  .login-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:20px;
  }
  .login-card{
    background:var(--card);border:2px solid var(--pine);border-radius:10px;
    padding:32px 28px;max-width:360px;width:100%;
  }
  .login-card .eyebrow{
    font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--soil);font-weight:700;
  }
  .login-card h1{
    font-family:var(--font-display);font-size:28px;font-weight:700;
    margin:2px 0 20px;color:var(--pine-dark);text-transform:uppercase;
  }
  .login-card label{display:block;margin-bottom:4px;}
  .login-card input{width:100%;margin-bottom:14px;}
  .login-error{
    font-family:var(--font-mono);font-size:12px;color:#B3391A;margin-bottom:10px;min-height:16px;
  }
  .login-btn{
    width:100%;font-family:var(--font-mono);font-weight:700;font-size:13px;letter-spacing:.05em;
    text-transform:uppercase;background:var(--pine);color:var(--canvas);
    border:none;border-radius:6px;padding:12px;cursor:pointer;
  }
  .login-btn:hover{background:var(--pine-dark);}
  .login-btn:disabled{opacity:.6;cursor:default;}

  /* HEADER */
  header{
    display:flex;justify-content:space-between;align-items:flex-end;
    flex-wrap:wrap;gap:16px;
    padding-bottom:18px;
    border-bottom:3px solid var(--pine);
    margin-bottom:22px;
  }
  .brand{display:flex;flex-direction:column;gap:2px;}
  .brand .eyebrow{
    font-family:var(--font-mono);
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--soil);font-weight:700;
  }
  .brand h1{
    font-family:var(--font-display);
    font-size:34px;font-weight:700;letter-spacing:.01em;
    margin:0;color:var(--pine-dark);text-transform:uppercase;
  }
  .header-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .mode-toggle{
    display:flex;background:var(--card);border:2px solid var(--pine);
    border-radius:999px;padding:3px;gap:2px;
  }
  .mode-toggle button{
    font-family:var(--font-mono);font-weight:700;font-size:12px;
    letter-spacing:.06em;text-transform:uppercase;
    border:none;background:transparent;color:var(--pine);
    padding:8px 16px;border-radius:999px;cursor:pointer;
    transition:background .15s ease, color .15s ease;
  }
  .mode-toggle button.active{background:var(--pine);color:var(--canvas);}
  .logout-btn{
    font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;
    background:transparent;border:1.5px solid var(--line);color:var(--ink-soft);
    border-radius:6px;padding:8px 12px;cursor:pointer;
  }
  .logout-btn:hover{border-color:var(--soil);color:var(--soil);}

  /* WEEK STATUS BAR */
  .weekbar{
    font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);
    display:flex;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:6px;
  }
  .sync-dot{
    display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--sage);
    margin-right:5px;vertical-align:middle;
  }

  section.block{margin-bottom:34px;}
  .block-title{
    display:flex;align-items:center;gap:10px;margin-bottom:12px;
  }
  .block-title h2{
    font-family:var(--font-display);font-size:20px;letter-spacing:.03em;
    text-transform:uppercase;color:var(--pine-dark);margin:0;
  }
  .block-title .rule{flex:1;height:2px;background:var(--line);}

  /* PRIORITY TASKS */
  .priority-grid{display:flex;flex-direction:column;gap:10px;}
  .stamp-card{
    background:var(--card);border:1px solid var(--line);
    border-left:5px solid var(--orange);
    border-radius:6px;padding:14px 16px;
    display:flex;gap:14px;align-items:flex-start;
    position:relative;
  }
  .stamp-card.done{opacity:.55;}
  .stamp-card.done .p-task{text-decoration:line-through;}
  .check{
    width:22px;height:22px;border:2px solid var(--pine);border-radius:5px;
    flex-shrink:0;margin-top:2px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    background:var(--card);
  }
  .check.checked{background:var(--pine);}
  .check.checked::after{content:"✓";color:var(--canvas);font-size:14px;font-weight:700;}
  .p-body{flex:1;min-width:0;}
  .p-task{font-weight:600;font-size:15px;color:var(--ink);margin-bottom:3px;}
  .p-notes{font-size:13px;color:var(--ink-soft);margin-bottom:6px;}
  .p-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .due-stamp{
    font-family:var(--font-mono);font-size:11px;font-weight:700;
    letter-spacing:.05em;text-transform:uppercase;
    color:var(--orange);border:1.5px solid var(--orange);
    border-radius:4px;padding:2px 8px;
    transform:rotate(-2deg);display:inline-block;
  }
  .due-stamp.overdue{color:#B3391A;border-color:#B3391A;background:rgba(179,57,26,.08);}
  .p-loc{font-family:var(--font-mono);font-size:11px;color:var(--soil);}
  .row-actions{display:flex;gap:6px;flex-shrink:0;}
  .icon-btn{
    border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
    border-radius:5px;width:28px;height:28px;cursor:pointer;font-size:13px;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{border-color:var(--soil);color:var(--soil);}
  .icon-btn.del:hover{border-color:#B3391A;color:#B3391A;}

  .empty-msg{
    font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);
    padding:16px;border:1.5px dashed var(--line);border-radius:6px;text-align:center;
  }

  /* DAY TABS */
  .day-tabs{display:flex;gap:4px;margin-bottom:0;flex-wrap:wrap;}
  .day-tab{
    font-family:var(--font-display);font-size:14px;letter-spacing:.04em;
    text-transform:uppercase;font-weight:600;
    padding:10px 18px 12px;border:2px solid var(--pine);border-bottom:none;
    border-radius:8px 8px 0 0;background:var(--line-soft);color:var(--ink-soft);
    cursor:pointer;position:relative;top:2px;
  }
  .day-tab .cnt{
    font-family:var(--font-mono);font-size:10px;margin-left:5px;color:inherit;opacity:.7;
  }
  .day-tab.active{background:var(--pine);color:var(--canvas);top:0;}
  .day-panel{
    background:var(--card);border:2px solid var(--pine);border-radius:0 8px 8px 8px;
    padding:16px;min-height:120px;
  }
  .sched-item{
    display:flex;gap:14px;align-items:flex-start;
    padding:12px 4px;border-bottom:1px solid var(--line-soft);
  }
  .sched-item:last-child{border-bottom:none;}
  .sched-item.done .s-task{text-decoration:line-through;color:var(--ink-soft);}
  .s-time{
    font-family:var(--font-mono);font-weight:700;font-size:13px;color:var(--pine-dark);
    min-width:74px;padding-top:2px;
  }
  .s-body{flex:1;min-width:0;}
  .s-task{font-weight:600;font-size:15px;}
  .s-loc{font-family:var(--font-mono);font-size:11px;color:var(--soil);margin-top:2px;}
  .s-notes{font-size:13px;color:var(--ink-soft);margin-top:4px;line-height:1.4;}

  /* FORMS */
  .add-btn{
    font-family:var(--font-mono);font-weight:700;font-size:12px;letter-spacing:.05em;
    text-transform:uppercase;background:var(--pine);color:var(--canvas);
    border:none;border-radius:6px;padding:9px 16px;cursor:pointer;
  }
  .add-btn:hover{background:var(--pine-dark);}
  .add-btn.ghost{background:transparent;color:var(--pine);border:1.5px solid var(--pine);}
  .form-card{
    background:var(--card);border:2px dashed var(--soil);border-radius:8px;
    padding:16px;margin-top:12px;display:flex;flex-direction:column;gap:10px;
  }
  .form-row{display:flex;gap:10px;flex-wrap:wrap;}
  .form-row > div{flex:1;min-width:140px;display:flex;flex-direction:column;gap:4px;}
  label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--soil);font-weight:700;}
  input,textarea{
    font-family:var(--font-body);font-size:14px;padding:8px 10px;
    border:1.5px solid var(--line);border-radius:5px;background:#fff;color:var(--ink);
  }
  input:focus,textarea:focus{outline:2px solid var(--sage);outline-offset:1px;border-color:var(--sage);}
  textarea{resize:vertical;min-height:44px;font-family:var(--font-body);}
  .form-actions{display:flex;gap:8px;justify-content:flex-end;}
  .btn-secondary{
    font-family:var(--font-mono);font-size:12px;font-weight:700;text-transform:uppercase;
    background:transparent;border:1.5px solid var(--line);color:var(--ink-soft);
    border-radius:6px;padding:8px 14px;cursor:pointer;
  }

  .footer-note{
    text-align:center;font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);
    margin-top:30px;
  }
  .loading{font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);text-align:center;padding:30px;}
  @media (max-width:520px){
    .brand h1{font-size:26px;}
    .day-tab{padding:8px 10px 10px;font-size:12px;}
    .s-time{min-width:58px;font-size:12px;}
  }
</style>
</head>
<body>
<div id="app">
  <div class="loading">Loading…</div>
</div>

<script>
/* =========================================================================
   FIREBASE CONFIG — replace the values below with your own project's config.
   Firebase Console > Project Settings > General > Your apps > Web app (</>) 
   ========================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyA5j1lmem4ZIEadWI-me5jAzszMTbIfUrs",
  authDomain: "grounds-crew.firebaseapp.com",
  projectId: "grounds-crew",
  storageBucket: "grounds-crew.firebasestorage.app",
  messagingSenderId: "1082893853616",
  appId: "1:1082893853616:web:097c4f37584bdc75832c75"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const DATA_DOC = db.collection("groundsCrew").doc("data");

/* ========================================================================= */

const DAYS = ["monday","tuesday","wednesday","thursday","friday"];
const DAY_LABEL = {monday:"Mon",tuesday:"Tue",wednesday:"Wed",thursday:"Thu",friday:"Fri"};
const DAY_FULL = {monday:"Monday",tuesday:"Tuesday",wednesday:"Wednesday",thursday:"Thursday",friday:"Friday"};

let state = {
  mode: "admin",
  activeDay: DAYS[Math.min(Math.max(new Date().getDay()-1,0),4)],
  data: { schedule: {monday:[],tuesday:[],wednesday:[],thursday:[],friday:[]}, priorityTasks: [] },
  openForm: null,
  currentUser: null,
};

function uid(){ return Math.random().toString(36).slice(2,9); }

/* ---------------- AUTH ---------------- */
auth.onAuthStateChanged(function(user){
  state.currentUser = user;
  if(user){
    attachDataListener();
    render();
  } else {
    detachDataListener();
    renderLogin();
  }
});

let unsubscribe = null;
function attachDataListener(){
  if(unsubscribe) return;
  unsubscribe = DATA_DOC.onSnapshot(function(doc){
    if(doc.exists){
      const d = doc.data();
      state.data = Object.assign(
        {schedule:{monday:[],tuesday:[],wednesday:[],thursday:[],friday:[]}, priorityTasks:[]},
        d
      );
      DAYS.forEach(function(day){ if(!state.data.schedule[day]) state.data.schedule[day]=[]; });
    }
    render();
  }, function(err){
    console.error("Sync error:", err);
  });
}
function detachDataListener(){
  if(unsubscribe){ unsubscribe(); unsubscribe = null; }
}

function saveData(){
  DATA_DOC.set(state.data).catch(function(e){ console.error("Save failed", e); });
}

function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  err.textContent = '';
  btn.disabled = true; btn.textContent = 'Logging in…';
  auth.signInWithEmailAndPassword(email, pass)
    .catch(function(e){
      err.textContent = 'Could not log in — check your email and password.';
    })
    .finally(function(){
      btn.disabled = false; btn.textContent = 'Log in';
    });
}
function doLogout(){ auth.signOut(); }

function renderLogin(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <span class="eyebrow">Grounds Crew · Work Order</span>
        <h1>Sign in</h1>
        <label>Email</label>
        <input id="login-email" type="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter') doLogin()">
        <label>Password</label>
        <input id="login-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()">
        <div class="login-error" id="login-error"></div>
        <button class="login-btn" id="login-btn" onclick="doLogin()">Log in</button>
      </div>
    </div>
  `;
  document.getElementById('login-email').focus();
}

/* ---------------- helpers ---------------- */
function fmtDate(iso){
  if(!iso) return "";
  const d = new Date(iso+"T00:00:00");
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function isOverdue(iso){
  if(!iso) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(iso+"T00:00:00");
  return d < today;
}
function fmtTime(t){
  if(!t) return "";
  const parts = t.split(":").map(Number);
  const h = parts[0], m = parts[1];
  const ampm = h>=12 ? "PM":"AM";
  const h12 = h%12===0?12:h%12;
  return h12+":"+String(m).padStart(2,'0')+" "+ampm;
}

/* ---------------- actions ---------------- */
function setMode(m){ state.mode = m; state.openForm=null; render(); }
function setActiveDay(d){ state.activeDay = d; state.openForm=null; render(); }

function toggleScheduleDone(day, id){
  const item = state.data.schedule[day].find(function(i){return i.id===id;});
  if(item){ item.done = !item.done; saveData(); }
}
function togglePriorityDone(id){
  const t = state.data.priorityTasks.find(function(t){return t.id===id;});
  if(t){ t.done = !t.done; saveData(); }
}
function deleteScheduleItem(day,id){
  state.data.schedule[day] = state.data.schedule[day].filter(function(i){return i.id!==id;});
  saveData();
}
function deletePriorityTask(id){
  state.data.priorityTasks = state.data.priorityTasks.filter(function(t){return t.id!==id;});
  saveData();
}
function openScheduleForm(day, editId){
  state.openForm = {type:'schedule', day:day, editId: editId||null};
  render();
  const el = document.getElementById('form-anchor');
  if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
}
function openPriorityForm(editId){
  state.openForm = {type:'priority', editId: editId||null};
  render();
  const el = document.getElementById('form-anchor');
  if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
}
function closeForm(){ state.openForm=null; render(); }

function submitScheduleForm(day, editId){
  const time = document.getElementById('f-time').value;
  const task = document.getElementById('f-task').value.trim();
  const location = document.getElementById('f-loc').value.trim();
  const notes = document.getElementById('f-notes').value.trim();
  if(!task){ alert('Please enter a task.'); return; }
  if(editId){
    const item = state.data.schedule[day].find(function(i){return i.id===editId;});
    Object.assign(item, {time:time, task:task, location:location, notes:notes});
  } else {
    state.data.schedule[day].push({id:uid(), time:time, task:task, location:location, notes:notes, done:false});
  }
  state.data.schedule[day].sort(function(a,b){ return (a.time||"99:99").localeCompare(b.time||"99:99"); });
  state.openForm=null;
  saveData(); render();
}
function submitPriorityForm(editId){
  const task = document.getElementById('f-ptask').value.trim();
  const dueDate = document.getElementById('f-pdue').value;
  const location = document.getElementById('f-ploc').value.trim();
  const notes = document.getElementById('f-pnotes').value.trim();
  if(!task){ alert('Please enter a task.'); return; }
  if(editId){
    const t = state.data.priorityTasks.find(function(t){return t.id===editId;});
    Object.assign(t, {task:task, dueDate:dueDate, location:location, notes:notes});
  } else {
    state.data.priorityTasks.push({id:uid(), task:task, dueDate:dueDate, location:location, notes:notes, done:false});
  }
  state.data.priorityTasks.sort(function(a,b){ return (a.dueDate||"9999").localeCompare(b.dueDate||"9999"); });
  state.openForm=null;
  saveData(); render();
}

/* ---------------- render ---------------- */
function render(){
  const app = document.getElementById('app');
  const isAdmin = state.mode === 'admin';

  const priorityHtml = renderPriorityBlock(isAdmin);
  const scheduleHtml = renderScheduleBlock(isAdmin);
  const userEmail = state.currentUser ? state.currentUser.email : '';

  app.innerHTML = `
    <div class="wrap">
      <header>
        <div class="brand">
          <span class="eyebrow">Grounds Crew · Work Order</span>
          <h1>Weekly Schedule</h1>
        </div>
        <div class="header-controls">
          <div class="mode-toggle">
            <button class="${isAdmin?'active':''}" onclick="setMode('admin')">Admin</button>
            <button class="${!isAdmin?'active':''}" onclick="setMode('worker')">Worker</button>
          </div>
          <button class="logout-btn" onclick="doLogout()">Log out (${escapeHtml(userEmail)})</button>
        </div>
      </header>
      <div class="weekbar">
        <span><span class="sync-dot"></span>${isAdmin ? 'Editing schedule — changes save instantly and sync to the worker view.' : 'Read-only view — check items off as you complete them.'}</span>
      </div>
      ${priorityHtml}
      ${scheduleHtml}
      <div class="footer-note">Grounds Crew Schedule App · synced live between Admin and Worker</div>
    </div>
  `;
}

function renderPriorityBlock(isAdmin){
  const tasks = state.data.priorityTasks;
  const form = state.openForm && state.openForm.type==='priority' ? renderPriorityForm(state.openForm.editId) : '';
  const addBtn = isAdmin ? `<button class="add-btn" onclick="openPriorityForm()">+ Add Priority Task</button>` : '';

  let list;
  if(tasks.length===0){
    list = `<div class="empty-msg">No high-priority tasks right now.</div>`;
  } else {
    list = `<div class="priority-grid">` + tasks.map(function(t){
      const overdue = !t.done && isOverdue(t.dueDate);
      return `
      <div class="stamp-card ${t.done?'done':''}">
        <div class="check ${t.done?'checked':''}" onclick="togglePriorityDone('${t.id}')" title="Mark ${t.done?'incomplete':'complete'}"></div>
        <div class="p-body">
          <div class="p-task">${escapeHtml(t.task)}</div>
          ${t.notes ? `<div class="p-notes">${escapeHtml(t.notes)}</div>` : ''}
          <div class="p-meta">
            ${t.dueDate ? `<span class="due-stamp ${overdue?'overdue':''}">${overdue?'Overdue · ':'Due '}${fmtDate(t.dueDate)}</span>` : ''}
            ${t.location ? `<span class="p-loc">📍 ${escapeHtml(t.location)}</span>` : ''}
          </div>
        </div>
        ${isAdmin ? `
        <div class="row-actions">
          <div class="icon-btn" onclick="openPriorityForm('${t.id}')" title="Edit">✎</div>
          <div class="icon-btn del" onclick="if(confirm('Delete this task?')) deletePriorityTask('${t.id}')" title="Delete">✕</div>
        </div>` : ''}
      </div>`;
    }).join('') + `</div>`;
  }

  return `
    <section class="block">
      <div class="block-title"><h2>Priority Tasks</h2><div class="rule"></div>${addBtn}</div>
      ${list}
      ${form}
    </section>
  `;
}

function renderPriorityForm(editId){
  const t = editId ? state.data.priorityTasks.find(function(x){return x.id===editId;}) : null;
  return `
    <div class="form-card" id="form-anchor">
      <div class="form-row">
        <div style="flex:2;">
          <label>Task</label>
          <input id="f-ptask" type="text" value="${t?escapeAttr(t.task):''}" placeholder="e.g. Repair irrigation valve near 9th hole">
        </div>
        <div>
          <label>Due date</label>
          <input id="f-pdue" type="date" value="${t?t.dueDate||'':''}">
        </div>
      </div>
      <div class="form-row">
        <div>
          <label>Location</label>
          <input id="f-ploc" type="text" value="${t?escapeAttr(t.location||''):''}" placeholder="e.g. West lawn">
        </div>
      </div>
      <div>
        <label>Notes / instructions</label>
        <textarea id="f-pnotes" placeholder="Any extra detail he needs">${t?escapeHtml(t.notes||''):''}</textarea>
      </div>
      <div class="form-actions">
        <button class="btn-secondary" onclick="closeForm()">Cancel</button>
        <button class="add-btn" onclick="submitPriorityForm(${editId?`'${editId}'`:'null'})">${t?'Save changes':'Add task'}</button>
      </div>
    </div>
  `;
}

function renderScheduleBlock(isAdmin){
  const tabs = DAYS.map(function(d){
    const count = state.data.schedule[d].length;
    return `<div class="day-tab ${state.activeDay===d?'active':''}" onclick="setActiveDay('${d}')">${DAY_LABEL[d]}<span class="cnt">(${count})</span></div>`;
  }).join('');

  const day = state.activeDay;
  const items = state.data.schedule[day];
  const form = state.openForm && state.openForm.type==='schedule' && state.openForm.day===day ? renderScheduleForm(day, state.openForm.editId) : '';
  const addBtn = isAdmin ? `<button class="add-btn ghost" onclick="openScheduleForm('${day}')">+ Add task to ${DAY_FULL[day]}</button>` : '';

  let list;
  if(items.length===0){
    list = `<div class="empty-msg">Nothing scheduled for ${DAY_FULL[day]} yet.</div>`;
  } else {
    list = items.map(function(i){ return `
      <div class="sched-item ${i.done?'done':''}">
        <div class="check ${i.done?'checked':''}" onclick="toggleScheduleDone('${day}','${i.id}')" title="Mark ${i.done?'incomplete':'complete'}"></div>
        <div class="s-time">${fmtTime(i.time)}</div>
        <div class="s-body">
          <div class="s-task">${escapeHtml(i.task)}</div>
          ${i.location ? `<div class="s-loc">📍 ${escapeHtml(i.location)}</div>` : ''}
          ${i.notes ? `<div class="s-notes">${escapeHtml(i.notes)}</div>` : ''}
        </div>
        ${isAdmin ? `
        <div class="row-actions">
          <div class="icon-btn" onclick="openScheduleForm('${day}','${i.id}')" title="Edit">✎</div>
          <div class="icon-btn del" onclick="if(confirm('Delete this task?')) deleteScheduleItem('${day}','${i.id}')" title="Delete">✕</div>
        </div>` : ''}
      </div>
    `; }).join('');
  }

  return `
    <section class="block">
      <div class="block-title"><h2>Weekly Schedule</h2><div class="rule"></div></div>
      <div class="day-tabs">${tabs}</div>
      <div class="day-panel">
        ${list}
        ${isAdmin ? `<div style="margin-top:12px;">${addBtn}</div>` : ''}
        ${form}
      </div>
    </section>
  `;
}

function renderScheduleForm(day, editId){
  const i = editId ? state.data.schedule[day].find(function(x){return x.id===editId;}) : null;
  return `
    <div class="form-card" id="form-anchor">
      <div class="form-row">
        <div>
          <label>Time</label>
          <input id="f-time" type="time" value="${i?i.time||'':''}">
        </div>
        <div style="flex:2;">
          <label>Task</label>
          <input id="f-task" type="text" value="${i?escapeAttr(i.task):''}" placeholder="e.g. Mow front lawn">
        </div>
        <div>
          <label>Location</label>
          <input id="f-loc" type="text" value="${i?escapeAttr(i.location||''):''}" placeholder="e.g. Front entrance">
        </div>
      </div>
      <div>
        <label>Notes / instructions</label>
        <textarea id="f-notes" placeholder="Any extra detail he needs">${i?escapeHtml(i.notes||''):''}</textarea>
      </div>
      <div class="form-actions">
        <button class="btn-secondary" onclick="closeForm()">Cancel</button>
        <button class="add-btn" onclick="submitScheduleForm('${day}', ${editId?`'${editId}'`:'null'})">${i?'Save changes':'Add task'}</button>
      </div>
    </div>
  `;
}

function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g, function(m){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];
  });
}
function escapeAttr(str){ return escapeHtml(str); }
</script>
</body>
</html>
